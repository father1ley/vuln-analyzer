<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Site Safety Check</title>
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <div id="container">
    <h2>🔐 Site Safety</h2>

    <!-- Score -->
    <div id="scoreBox">
      <span id="score">--</span>
      <span class="label">/ 100</span>
      <span id="riskLevel" class="risk-level"></span>
    </div>

    <!-- Status Message -->
    <p id="message">Scanning...</p>

    <!-- Malware Warning -->
    <div id="malwareBox" class="hidden">
      <h3>🚨 Threat Detected</h3>
      <p id="threats"></p>
    </div>

    <!-- Technologies -->
    <div id="techBox">
      <h3>🧩 Technologies</h3>
      <ul id="techList">
        <li>Scanning…</li>
      </ul>
    </div>

    <!-- WHOIS / Domain Info -->
    <div id="whoisBox">
      <h3>🧾 Domain Info</h3>
      <p><strong>Registrar:</strong> <span id="whoisRegistrar">--</span></p>
      <p><strong>Created:</strong> <span id="whoisDate">--</span></p>
    </div>

    <!-- Footer -->
    <footer>
      <button id="rescanBtn">Rescan</button>
      <button id="exportBtn">Export Security Report</button>

    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
